<svg xmlns="http://www.w3.org/2000/svg" width="720" height="430" viewBox="0 0 720 430" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#9aa0a6"/>
    </marker>
  </defs>

  <!-- frame -->
  <rect x="20" y="20" width="680" height="360" rx="6"
        fill="#16191d" stroke="#3a3f45" stroke-width="1.5"/>

  <!-- centre guides -->
  <line x1="360" y1="20" x2="360" y2="380" stroke="#2c3036" stroke-width="1" stroke-dasharray="4 5"/>
  <line x1="20" y1="200" x2="700" y2="200" stroke="#2c3036" stroke-width="1" stroke-dasharray="4 5"/>

  <!-- left: { left:16, top:16 } -->
  <g>
    <rect x="40" y="40" width="96" height="38" rx="4" fill="#0083f1"/>
    <text x="88" y="64" fill="#ffffff" font-size="14" text-anchor="middle">left</text>
  </g>

  <!-- right: { right:16, top:16 } -->
  <g>
    <rect x="584" y="40" width="96" height="38" rx="4" fill="#0083f1"/>
    <text x="632" y="64" fill="#ffffff" font-size="14" text-anchor="middle">right</text>
  </g>

  <!-- centerX:0 / centerY:0 -->
  <g>
    <rect x="312" y="181" width="96" height="38" rx="4" fill="#0083f1"/>
    <text x="360" y="205" fill="#ffffff" font-size="14" text-anchor="middle">center 0,0</text>
  </g>

  <!-- centre crosshair -->
  <g stroke="#9aa0a6" stroke-width="1.4">
    <line x1="352" y1="200" x2="368" y2="200"/>
    <line x1="360" y1="192" x2="360" y2="208"/>
  </g>

  <!-- offset arrow: from centre to offset node centre (430,250) -->
  <line x1="364" y1="204" x2="424" y2="246" stroke="#9aa0a6" stroke-width="1.4"
        stroke-dasharray="3 4" marker-end="url(#arrow)"/>

  <!-- centerX/centerY offset != 0 -->
  <g>
    <rect x="382" y="231" width="96" height="38" rx="4" fill="#e23b3b"/>
    <text x="430" y="255" fill="#ffffff" font-size="13" text-anchor="middle">center +70,+50</text>
  </g>

  <!-- dual-inset: { left:16, right:16, bottom:16 } -->
  <g>
    <rect x="40" y="324" width="640" height="36" rx="4" fill="#0083f1" fill-opacity="0.85"/>
    <text x="360" y="347" fill="#ffffff" font-size="14" text-anchor="middle">dual-inset (left + right) &#8594; width derived</text>
  </g>

  <!-- caption -->
  <text x="20" y="410" fill="#9aa0a6" font-size="13">
    Same node, four anchors on one frame. <tspan fill="#e23b3b">centerX/centerY</tspan> with a non-zero offset shifts from the centre crosshair.
  </text>
</svg>
