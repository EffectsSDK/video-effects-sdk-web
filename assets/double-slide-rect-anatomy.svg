<svg xmlns="http://www.w3.org/2000/svg" width="860" height="360" viewBox="0 0 860 360" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <!-- video frame backdrop -->
  <rect x="0" y="0" width="860" height="360" fill="#1c1f24"/>
  <!-- separator between render and legend -->
  <line x1="410" y1="28" x2="410" y2="332" stroke="#2c3036" stroke-width="1"/>

  <!-- ── rendered lower third (rest state) ─────────────────────────── -->

  <!-- title -->
  <text x="40" y="128" fill="#ffffff" font-size="38" font-weight="700">LowerThird Title</text>

  <!-- subtitle plate: white backPlate, blue plate on top, subtitle text -->
  <rect x="34" y="152" width="300" height="46" fill="#ffffff"/>            <!-- backPlate -->
  <rect x="34" y="152" width="272" height="46" fill="#0083f1"/>            <!-- plate -->
  <text x="48" y="182" fill="#ffffff" font-size="20" font-weight="700">LowerThird Subtitle</text>

  <!-- mask clip boxes (dashed) -->
  <rect x="34" y="92"  width="350" height="50" fill="none" stroke="#f2b134" stroke-width="1.4" stroke-dasharray="5 4"/>
  <rect x="34" y="152" width="300" height="46" fill="none" stroke="#f2b134" stroke-width="1.4" stroke-dasharray="5 4"/>

  <!-- numbered badges -->
  <g font-size="12" font-weight="700" text-anchor="middle">
    <g><circle cx="28"  cy="90"  r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="28"  y="94"  fill="#fff">1</text></g>
    <g><circle cx="150" cy="120" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="150" y="124" fill="#fff">2</text></g>
    <g><circle cx="380" cy="116" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="380" y="120" fill="#fff">3</text></g>
    <g><circle cx="28"  cy="150" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="28"  y="154" fill="#fff">4</text></g>
    <g><circle cx="320" cy="175" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="320" y="179" fill="#fff">5</text></g>
    <g><circle cx="92"  cy="175" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="92"  y="179" fill="#fff">6</text></g>
    <g><circle cx="232" cy="175" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="232" y="179" fill="#fff">7</text></g>
    <g><circle cx="150" cy="196" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="150" y="200" fill="#fff">8</text></g>
  </g>

  <!-- ── legend ────────────────────────────────────────────────────── -->
  <g font-size="13">
    <g><circle cx="442" cy="44"  r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="442" y="48"  fill="#fff" font-size="12" font-weight="700" text-anchor="middle">1</text>
       <text x="462" y="48"  fill="#e6e8ea"><tspan font-weight="700">titleClip</tspan><tspan fill="#9aa0a6"> — group, hugs the title</tspan></text></g>
    <g><circle cx="442" cy="80"  r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="442" y="84"  fill="#fff" font-size="12" font-weight="700" text-anchor="middle">2</text>
       <text x="462" y="84"  fill="#e6e8ea"><tspan font-weight="700">title</tspan><tspan fill="#9aa0a6"> — text, masked; rises from below</tspan></text></g>
    <g><circle cx="442" cy="116" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="442" y="120" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">3</text>
       <text x="462" y="120" fill="#e6e8ea"><tspan font-weight="700">titleMask</tspan><tspan fill="#9aa0a6"> — clip box for the title</tspan></text></g>
    <g><circle cx="442" cy="152" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="442" y="156" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">4</text>
       <text x="462" y="156" fill="#e6e8ea"><tspan font-weight="700">plateGroup</tspan><tspan fill="#9aa0a6"> — group, stacks the plate layers</tspan></text></g>
    <g><circle cx="442" cy="188" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="442" y="192" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">5</text>
       <text x="462" y="192" fill="#e6e8ea"><tspan font-weight="700">backPlate</tspan><tspan fill="#9aa0a6"> — white, right:0; wipes in from the right</tspan></text></g>
    <g><circle cx="442" cy="224" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="442" y="228" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">6</text>
       <text x="462" y="228" fill="#e6e8ea"><tspan font-weight="700">plate</tspan><tspan fill="#9aa0a6"> — blue, autofills; wipes over from the left</tspan></text></g>
    <g><circle cx="442" cy="260" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="442" y="264" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">7</text>
       <text x="462" y="264" fill="#e6e8ea"><tspan font-weight="700">subtitle</tspan><tspan fill="#9aa0a6"> — text, masked; slides in</tspan></text></g>
    <g><circle cx="442" cy="296" r="11" fill="#101317" stroke="#ffffff" stroke-width="1.4"/><text x="442" y="300" fill="#fff" font-size="12" font-weight="700" text-anchor="middle">8</text>
       <text x="462" y="300" fill="#e6e8ea"><tspan font-weight="700">plateMask</tspan><tspan fill="#9aa0a6"> — clip box for the subtitle, left:0</tspan></text></g>
  </g>

  <!-- caption -->
  <text x="34" y="344" fill="#9aa0a6" font-size="12">
    Double Slide Rect — node anatomy (rest state). <tspan fill="#f2b134">Dashed</tspan> = mask clip boxes.
  </text>
</svg>
